<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="精选优质网站资源导航，一站直达">
  <title>资源导航站</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <svg class="brand-icon" width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="16" fill="url(#g)"/>
          <path d="M20 22h24M20 32h16M20 42h20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <circle cx="46" cy="42" r="6" fill="#fff" opacity=".9"/>
        </svg>
        <div class="brand-text">
          <h1 class="brand-title" id="siteTitle">资源导航站</h1>
          <p class="brand-subtitle" id="siteSubtitle">精选优质网站，一站直达</p>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav" aria-label="分类导航"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="searchInput" class="search-input" placeholder="搜索网站..." autocomplete="off" spellcheck="false">
          <button class="search-clear" id="searchClear" type="button" aria-label="清除搜索" hidden>×</button>
        </div>

        <div class="topbar-actions">
          <select class="lang-select" id="langSelect" aria-label="语言">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ru">Русский</option>
          </select>

          <button class="icon-btn theme-btn" id="themeBtn" type="button" aria-label="切换深色模式">
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" hidden>
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          </button>
        </div>
      </header>

      <section class="content">
        <div class="content-header" id="contentHeader">
          <h2 class="category-title" id="categoryTitle">全部</h2>
          <span class="site-count" id="siteCount"></span>
        </div>

        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon">🔍</div>
          <p id="emptyText">没有找到匹配的网站</p>
        </div>

        <div class="site-grid" id="siteGrid"></div>
      </section>

      <footer class="footer">
        <p id="footerText">Copyright © 2026 资源导航站 · 数据驱动 · Cloudflare Pages</p>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
